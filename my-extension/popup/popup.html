<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ui debugger</title>
    <link rel="stylesheet" href="popup.css">
    <style>
    /* Inline popup styles for UI FACECARD */
    :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,'Helvetica Neue',Arial}
    html,body{width:300px;height:180px;margin:0;padding:12px;background:transparent}
    .facecard{display:flex;gap:12px;align-items:center}
    .facecard-img{width:64px;height:64px;object-fit:cover;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.12)}
    .facecard-body h3{margin:0;font-size:16px;color:#111}
    .facecard-body p{margin:6px 0 10px;font-size:12px;color:#333}
    #toggleButton{appearance:none;border:0;padding:8px 10px;background:#2563eb;color:#fff;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
    <div class="facecard">
        <img class="facecard-img" src="../assets/images/on.png" alt="UI Face">
        <div class="facecard-body">
            <h3>UI FACECARD</h3>
            <p>Quick controls for the UI Debugger extension.</p>
            <button id="toggleButton">Toggle UI Debugger</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
